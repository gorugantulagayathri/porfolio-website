<!DOCTYPE html>
<html>
        <link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap" rel="stylesheet">
    <head>
        <title>Mediatags</title>
        <style>
            body{
                font-family: "Shadows Into Light";
                background: #ced8e7;
                color: rgb(146, 146, 212);
                margin: 0;
                padding: 20px;
            }
            h1{
                text-align: center;
                color:palevioletred;
            }
            section{
                background: white;
                padding: 15px;
                margin: 20px auto;
                max-width: 700px;
                border-radius: 8px;
                box-shadow: 0 0 500px yellow;
                text-align: center;
            }
            figure{
                text-align: center;
            }
            figcaption{
                font-style: "Shadows Into Light";
                color: #555;
                font-size: medium;
            }
        </style>
    </head>
    <body>
        <h1>Learn Geetha Online</h1>

        <!--image section-->
        <section>
            <h2>Sri Krishna</h2>
            <figure>
                <image src="kimage.png"  width="500"></image>
                <figcaption><b>Sri Krishna</b></figcaption>
            </figure>
        </section>
        <!--audio section-->
        <section>
            <h2>Audio Media</h2>
            <audio controls src="geetha.mp4" type="audio/mpeg">
                Your browser dosent support audio.
            </audio>
        </section>
        <!--video section-->
        <section>
            <h2>Vedio Media</h2>
            <video controls width="400" poster="krishna1.jpeg" src="krishnadance.mp4" type="video/mp4">
                Your browser dosent support video.
            </video>
        </section>
        <!--pdf sec-->
        
        <section>
        <h2>Embedded PDF</h2>
        <embed src="sample.pdf" type="application/pdf" width="100%" height="400">
        </section>
        <!--yt video-->
        <section>
            <iframe width="560" height="315" src="https://www.youtube.com/embed/g883CDeZtBA?si=yfP43MLClvG0fy1O" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </section>
    </body>
</html>
